<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 연동 재고 조사 시스템</title>
    <!-- Tailwind CSS (디자인 스킨) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 모바일 터치 미스 방지를 위한 터치 영역 확보 */
        .touch-btn { min-height: 44px; min-width: 44px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen pb-12">

    <!-- 상단 바 -->
    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">📦 실시간 재고조사 대시보드</h1>
            <div class="flex items-center gap-2">
                <span id="sync-status" class="inline-block w-2 h-2 rounded-full bg-red-400"></span>
                <span id="sync-text" class="text-xs text-blue-100">연결 중...</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-6 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- 왼쪽: 신규 품목 등록 폼 (PC에서 입력하기 편리) -->
        <section class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 h-fit">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">➕ 신규 품목 등록</h2>
            <form id="product-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">바코드 / 품목코드</label>
                    <input type="text" id="p-code" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-blue-500 text-sm" placeholder="예: 8801234567">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">품목명</label>
                    <input type="text" id="p-name" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-blue-500 text-sm" placeholder="예: 모니터 거치대">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">초기 수량</label>
                    <input type="number" id="p-qty" value="0" min="0" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-blue-500 text-sm">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg text-sm transition shadow-xs cursor-pointer">DB에 등록하기</button>
            </form>
        </section>

        <!-- 오른쪽: 실시간 재고 현황 리스트 (PC/모바일 공용 반응형) -->
        <section class="bg-white p-5 rounded-xl shadow-xs border border-gray-100 md:col-span-2">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-4">
                <h2 class="text-lg font-bold">📋 현재 조사된 재고 목록</h2>
                <div class="text-xs text-gray-400">품목을 탭하여 스마트폰에서 바로 수량을 조절하세요.</div>
            </div>

            <!-- 로딩 바 -->
            <div id="loading" class="text-center py-8 text-gray-500">데이터를 클라우드에서 불러오는 중...</div>

            <!-- 재고 리스트 (테이블 형태 스크롤 방지, 모바일에서 카드 형태로 대응 가능하나 직관성을 위해 리스트화) -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[500px] md:min-w-full">
                    <thead>
                        <tr class="border-b border-gray-200 text-sm text-gray-500 bg-gray-50">
                            <th class="p-3">코드</th>
                            <th class="p-3">품목명</th>
                            <th class="p-3 text-center">수량 조절 (실시간 연동)</th>
                            <th class="p-3 text-right">관리</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-list" class="divide-y divide-gray-100 text-sm">
                        <!-- Firebase 데이터가 여기에 동적으로 생성됩니다. -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Firebase 모듈 스크립트 로드 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ⚠️ 본인의 Firebase 웹 앱 설정값으로 반드시 변경해 주세요!
        const firebaseConfig = {
            apiKey: "jsy000818",
            authDomain: "jsy000818",
            projectId: "jsy000818",
            storageBucket: "jsy000818",
            messagingSenderId: "jsy000818",
            appId: "jsy000818"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const inventoryCol = collection(db, "inventory");

        // UI 요소 연결
        const productForm = document.getElementById('product-form');
        const inventoryList = document.getElementById('inventory-list');
        const loadingEl = document.getElementById('loading');
        const syncStatus = document.getElementById('sync-status');
        const syncText = document.getElementById('sync-text');

        // 1. 실시간 데이터 동기화 리스너 (구독)
        // 이 함수 덕분에 PC나 폰 어느 한쪽에서 변경하면 다른 쪽 화면이 새로고침 없이 바뀝니다.
        onSnapshot(inventoryCol, (snapshot) => {
            // 상단 연결 상태 표시 변경
            syncStatus.classList.remove('bg-red-400');
            syncStatus.classList.add('bg-green-500');
            syncText.innerText = "실시간 클라우드 연동 됨";
            loadingEl.classList.add('hidden');

            inventoryList.innerHTML = "";

            if(snapshot.empty) {
                inventoryList.innerHTML = `<tr><td colspan="4" class="text-center p-8 text-gray-400">등록된 품목이 없습니다. 신규 등록을 해주세요.</td></tr>`;
                return;
            }

            snapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 font-mono text-xs text-gray-500">${item.code}</td>
                    <td class="p-3 font-semibold text-gray-900">${item.name}</td>
                    <td class="p-3">
                        <div class="flex items-center justify-center gap-1">
                            <button data-id="${id}" data-action="minus" class="touch-btn px-3 py-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-lg text-lg cursor-pointer">-</button>
                            <span class="w-12 text-center font-bold text-base text-blue-600">${item.qty}</span>
                            <button data-id="${id}" data-action="plus" class="touch-btn px-3 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-lg text-lg cursor-pointer">+</button>
                        </div>
                    </td>
                    <td class="p-3 text-right">
                        <button data-id="${id}" data-action="delete" class="text-xs text-red-500 hover:text-red-700 font-medium cursor-pointer">삭제</button>
                    </td>
                `;
                inventoryList.appendChild(tr);
            });
        }, (error) => {
            console.error("Firebase 연결 에러: ", error);
            syncStatus.className = "inline-block w-2 h-2 rounded-full bg-red-500";
            syncText.innerText = "연결 실패 (설정 확인 필요)";
        });

        // 2. 신규 품목 등록 이벤트
        productForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('p-code').value.trim();
            const name = document.getElementById('p-name').value.trim();
            const qty = parseInt(document.getElementById('p-qty').value) || 0;

            try {
                // 바코드 코드를 도큐먼트 ID로 삼아 중복등록 방지 및 덮어쓰기/수정 가능케 함
                await setDoc(doc(db, "inventory", code), {
                    code: code,
                    name: name,
                    qty: qty,
                    updatedAt: new Date()
                });
                productForm.reset();
                document.getElementById('p-qty').value = "0";
                document.getElementById('p-code').focus();
            } catch (err) {
                alert("등록에 실패했습니다: " + err.message);
            }
        });

        // 3. 리스트 안의 버튼(+ / - / 삭제) 클릭 이벤트 핸들러 (이벤트 위임 방식)
        inventoryList.addEventListener('click', async (e) => {
            const button = e.target.closest('button');
            if (!button) return;

            const id = button.dataset.id;
            const action = button.dataset.action;
            const itemRef = doc(db, "inventory", id);

            if (action === "plus") {
                // 원자적 인크리먼트 기능을 사용해 다중 접속 환경에서 데이터 꼬임을 방지합니다.
                await updateDoc(itemRef, { qty: increment(1) });
            } else if (action === "minus") {
                // 0 미만으로 내려가지 않도록 유저 인터페이스 상태 확인이 필요하나, 간결성을 위해 즉시 반영
                await updateDoc(itemRef, { qty: increment(-1) });
            } else if (action === "delete") {
                if (confirm("정말 이 품목을 대시보드에서 삭제하시겠습니까?")) {
                    await deleteDoc(itemRef);
                }
            }
        });
    </script>
</body>
</html>
